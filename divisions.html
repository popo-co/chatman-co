<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Divisions</title>
    <style>
        body { background: #fff; margin: 0; font-family: -apple-system, sans-serif; }
        .container { padding: 100px 20px; text-align: left; }
        h1 { font-size: 32px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 40px; }
        :root {
    --black: #000000;
    --white: #ffffff;
}

    /* --- about.html 전용 GNB 스타일 --- */
        .gnb.about-nav {
            position: fixed;
            top: 0; 
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px; /* 높이 딱 맞춤 */
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 0.5px solid #ddd;
            z-index: 1000;
            box-sizing: border-box; /* 패딩 때문에 삐져나가는 거 방지 */
        }
        
        /* 로고 버튼 스타일 */
        .about-nav .logo { 
            font-size: 22px; 
            font-weight: 900; 
            letter-spacing: -0.8px; 
            color: #000; /* 블랙 고정 */
            display: flex; 
            align-items: center; 
        }
        .about-nav .reg-mark { 
            font-size: 12px; 
            vertical-align: super; 
            margin-left: 1px; 
            font-weight: 400; 
        }
        
        /* 🚨 우측 버튼 컨테이너: 절대 안 내려가게 수직 중앙 정렬 강제 */
        .about-nav .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .about-nav .contact-btn { 
            text-decoration: none; 
            font-size: 11px; 
            font-weight: 600; 
            color: #000; 
            border: 1px solid #000; 
            padding: 6px 12px; 
            border-radius: 20px; 
            display: inline-block;
        }
        
        /* 🚨 햄버거 메뉴: 테두리 짤림/배경 무조건 날려버림 */
        .about-nav .menu-toggle {
            background: transparent !important;
            border: none !important;
            padding: 0;
            margin: 0;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 6px;
            outline: none;
        }
        
        .about-nav .menu-toggle span { 
            display: block; 
            width: 24px; 
            height: 1.5px; 
            background-color: #000; /* 블랙 3줄 고정 */
        }
        /* --- 1. 풀스크린 메뉴 오버레이 --- */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #000;
            z-index: 999; /* 기존 GNB(1000)보다 한 칸 아래 깔림 */
            display: flex;
            flex-direction: column;
            padding: 40px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        
        .menu-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        /* --- 2. 거대한 영문 메뉴 타이포그래피 --- */
        .menu-nav {
            display: flex;
            flex-direction: column;
            gap: 32px;
            margin-top: 80px;
        }
        
        .menu-link {
            font-size: 28px; /* 화면 꽉 차는 사이즈 */
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            transform: translateY(30px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        .menu-overlay.active .menu-link { transform: translateY(0); opacity: 1; }
        .menu-overlay.active .menu-link:nth-child(1) { transition-delay: 0.1s; }
        .menu-overlay.active .menu-link:nth-child(2) { transition-delay: 0.2s; }
        .menu-overlay.active .menu-link:nth-child(3) { transition-delay: 0.3s; }
        
        /* --- 3. 메뉴 열렸을 때 GNB 강제 화이트 & X 변신 --- */
        /* 스크롤 내린 상태에서 메뉴 열어도 뒤에 하얀 배경 날리고 글씨 하얗게 */
        .gnb.menu-open {
            background: transparent !important;
            backdrop-filter: none !important;
            border-bottom: none !important;
        }
        .gnb.menu-open .logo { color: #fff !important; }
        .gnb.menu-open .contact-btn { color: #fff !important; border-color: #fff !important; }
        .gnb.menu-open .menu-toggle span { background-color: #fff !important; }
        
        /* 햄버거 세 줄 -> X로 변신 애니메이션 */
        .gnb.menu-open .menu-toggle span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
        .gnb.menu-open .menu-toggle span:nth-child(2) { opacity: 0; }
        .gnb.menu-open .menu-toggle span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

         /* 전체 섹션 및 탭 네비게이션 */
        .cmc-division-section { padding: 60px 0; background-color: #fff; }
        
        .division-tab-nav {
            display: flex; gap: 20px; overflow-x: auto;
            padding: 0 0 20px; scrollbar-width: none;
        }
        .division-tab-nav::-webkit-scrollbar { display: none; }
        
        .div-tab-btn {
            border: none; background: none; font-size: 15px; font-weight: 500;
            color: #bbb; white-space: nowrap; cursor: pointer;
            transition: 0.3s; padding-bottom: 12px; position: relative;
        }
        .div-tab-btn.active { color: #000; font-weight: 800; }
        .div-tab-btn.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0;
            width: 100%; height: 3px; background: #000;
        }
        
        /* 탭 전환 애니메이션 */
        .division-tab-pane { display: none; padding: 20px 0; animation: cmcSlideUp 0.4s ease-out; }
        .division-tab-pane.active { display: block; }
        @keyframes cmcSlideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 카드 가로 스크롤 레이아웃 */
        .division-card-container {
            display: flex; gap: 15px; overflow-x: auto;
            scrollbar-width: none; padding-right: 10px;
        }
        .division-card-container::-webkit-scrollbar { display: none; }
        
        /* 프로필 카드 본체 */
        .cmc-profile-card {
            flex: 0 0 295px; /* 👈 옆 카드 살짝 보이게 만드는 핵심 수치 */
            height: 410px; background-color: #efefef;
            background-size: cover; background-position: center;
            border-radius: 26px; position: relative; overflow: hidden;
        }
        
        /* 하단 반투명 정보창 (Glassmorphism) */
        .cmc-info-box {
            position: absolute; bottom: 15px; left: 15px; right: 15px;
            padding: 20px; background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-radius: 22px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }

        .cmc-profile-card:only-child {
            flex: 1 1 auto !important; /* 혼자 있을 땐 빈 공간을 다 먹어라! */
            max-width: 450px !important; /* 단, PC에서 무식하게 커지는 건 방지 (아이폰 꽉 차는 사이즈) */
            width: 100% !important;
        }
        
        .cmc-info-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .cmc-name { font-size: 18px; font-weight: 800; color: #000; margin: 0; }
        
        /* 소셜 아이콘 동그라미 */
        .cmc-socials { display: flex; gap: 7px; }
        .cmc-icon-circle {
            width: 28px; height: 28px; background-color: #ededed;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 11px; color: #666; font-weight: 700;
        }
        
        .cmc-role { font-size: 13px; color: #333; font-weight: 400; margin: 0; opacity: 0.9;
        }
 
        /* 🔵 2-Depth: 팀 탭 네비게이션 (알약 모양 버튼 스타일) */
        .team-tab-nav {
            display: flex; gap: 10px; padding: 0 20px 25px;
            overflow-x: auto; scrollbar-width: none;
        }
        .team-tab-nav::-webkit-scrollbar { display: none; }
        
        .team-tab-btn {
            padding: 8px 18px; border-radius: 20px;
            background-color: #f5f5f5; border: 1px solid #eaeaea;
            font-size: 13px; color: #888; cursor: pointer;
            transition: all 0.2s ease; white-space: nowrap;
        }
        .team-tab-btn:hover { background-color: #eee; }
        
        /* 선택된 팀 버튼은 시크한 블랙으로! */
        .team-tab-btn.active {
            background-color: #1a1a1a; color: #fff;
            border-color: #1a1a1a; font-weight: 600;
        }
        
        /* 팀 컨텐츠 전환 애니메이션 */
        .team-tab-pane { display: none; animation: cmcFadeIn 0.3s ease; }
        .team-tab-pane.active { display: block; }
        @keyframes cmcFadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* 🚨 1명일 때 꽉 차게 넓어지는 마법 (이거 꼭 있어야 함!) */
        .cmc-profile-card:only-child {
            flex: 1 1 auto !important;
            max-width: 480px !important;
            width: 100% !important;
        }
        
    </style>
</head>
<body>
    <nav class="gnb about-nav">
        <a href="index.html" class="logo" style="text-decoration: none;">
            CMC<span class="reg-mark">®</span>
        </a>
        
        <div class="nav-right">
            <a href="mailto:contact@chatman.co" class="contact-btn">CONTACT</a>
            <button class="menu-toggle" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

<div class="menu-overlay">
    <nav class="menu-nav">
        <a href="about.html" class="menu-link">Corporate Identity</a>
        <a href="#" class="menu-link">Our Divisions</a>
        <a href="#" class="menu-link">Careers</a>
    </nav>
</div>
    
<div class="container">
    <h1>Divisions</h1>
    <p>Defining the new elite across every frontier.</p>
    
<section class="cmc-division-section">
    <div class="division-tab-nav">
        <button class="div-tab-btn active" onclick="cmcSwitchDiv(event, 'div-strategy')">Strategy Planning</button>
        <button class="div-tab-btn" onclick="cmcSwitchDiv(event, 'div-digital')">Digital Innovation</button>
    </div>

    <div id="div-strategy" class="division-tab-pane active">
        
        <div class="team-tab-nav">
            <button class="team-tab-btn active" onclick="cmcSwitchTeam(event, 'team-strat-1', 'div-strategy')">Core Strategy Team</button>
            <button class="team-tab-btn" onclick="cmcSwitchTeam(event, 'team-strat-2', 'div-strategy')">Market Research</button>
        </div>

        <div id="team-strat-1" class="team-tab-pane active">
            <div class="division-card-container">
                <div class="cmc-profile-card" style="background-image: url('Adrian_사진주소');">
                    <div class="cmc-info-box">
                        <div class="cmc-info-top">
                            <h4 class="cmc-name">Adrian Vale</h4>
                            <div class="cmc-socials">
                                <span class="cmc-icon-circle">G</span><span class="cmc-icon-circle">X</span><span class="cmc-icon-circle">L</span>
                            </div>
                        </div>
                        <p class="cmc-role">Strategy Planning / Senior Manager</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="team-strat-2" class="team-tab-pane">
            <div class="division-card-container"><p style="color:#999;">Updating...</p></div>
        </div>
    </div>

    <div id="div-digital" class="division-tab-pane">
        
        <div class="team-tab-nav">
            <button class="team-tab-btn active" onclick="cmcSwitchTeam(event, 'team-digi-1', 'div-digital')">Product Design Team</button>
        </div>

        <div id="team-digi-1" class="team-tab-pane active">
            <div class="division-card-container">
                <div class="cmc-profile-card" style="background-image: url('Jamie_사진주소');">
                    </div>
            </div>
        </div>
    </div>
</section>



        
</div>
  
    <script>
        function toggleMenu() {
            const nav = document.querySelector('.gnb');
            const overlay = document.querySelector('.menu-overlay');
            nav.classList.toggle('menu-open'); // X자 변신용 클래스 (필요시)
            overlay.classList.toggle('active');
            
            if (overlay.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = '';
            }
        }
    
                // 메뉴 열기/닫기 로직 교체
            function toggleMenu() {
                const nav = document.querySelector('.gnb');
                const overlay = document.querySelector('.menu-overlay');
            
                // 토글: 클래스가 없으면 넣고, 있으면 빼기
                nav.classList.toggle('menu-open');
                overlay.classList.toggle('active');
            
                // 메뉴 열렸을 때 뒤에 원래 페이지 스크롤되는 거 꽉 막기
                if (overlay.classList.contains('active')) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = '';
                }
            }

        // 1-Depth: 본부 전환
        function cmcSwitchDiv(evt, divId) {
            document.querySelectorAll('.division-tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.div-tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(divId).classList.add('active');
            evt.currentTarget.classList.add('active');
        }
        
        // 2-Depth: 팀 전환 (해당 본부 안에서만 작동하게 제한)
        function cmcSwitchTeam(evt, teamId, parentDivId) {
            const parentPane = document.getElementById(parentDivId);
            
            parentPane.querySelectorAll('.team-tab-pane').forEach(p => p.classList.remove('active'));
            parentPane.querySelectorAll('.team-tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(teamId).classList.add('active');
            evt.currentTarget.classList.add('active');
        }   
    </script>
</body>
</html>
