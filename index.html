<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMC® | CHATMAN CO.</title>
    <style>
        :root {
            --white: #ffffff;
            --black: #000000;
            --accent: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* 1. GNB 스타일 (상단 바) */
        .gnb {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            background: transparent;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        /* 스크롤 시 변할 스타일 */
        .gnb.scrolled {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-bottom: 0.5px solid #ddd;
        }

        .logo {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.8px;
            color: var(--white);
            transition: color 0.3s;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .gnb.scrolled .logo { color: var(--black); }

        .reg-mark {
            font-size: 12px;
            vertical-align: super;
            margin-left: 1px;
            font-weight: 400;
            letter-spacing: normal;
        }

        .nav-right { display: flex; align-items: center; gap: 20px; }

        .contact-btn {
            text-decoration: none;
            color: var(--white);
            font-size: 11px;
            font-weight: 600;
            border: 1px solid var(--white);
            padding: 6px 12px;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .gnb.scrolled .contact-btn {
            color: var(--black);
            border-color: var(--black);
        }

        /* 햄버거 메뉴 아이콘 */
        .menu-toggle {
            background: none; border: none; cursor: pointer;
            display: flex; flex-direction: column; gap: 6px;
        }

        .menu-toggle span {
            display: block; width: 24px; height: 1.5px;
            background-color: var(--white); transition: 0.3s;
        }

        .gnb.scrolled .menu-toggle span { background-color: var(--black); }

        /* 2. 히어로 섹션 (비디오 배경) */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            background-color: var(--black);
        }

        .bg-video {
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            object-fit: cover;
            transform: translate(-50%, -50%);
            z-index: 1;
            filter: brightness(0.7);
        }

        .hero-content { position: relative; z-index: 2; padding: 20px; }

        .hero-content h1 {
            font-size: 18vw;
            line-height: 0.85;
            letter-spacing: -0.05em;
            font-weight: 900;
            text-transform: uppercase;
        }

        .hero-content p {
            margin-top: 25px;
            font-size: 13px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0.8;
        }

        /* 3. 컨텐츠 섹션 (스크롤 테스트용) */
            .partners-section {
                background-color: #fff;
                padding: 60px 0 140px 0;
                overflow: hidden;
            }
            
            .partners-container {
                max-width: 100%;
                margin: 0 auto;
            }
            
            .partners-title {
                padding-left: 20px; /* 왼쪽 정렬 및 여백 */
                font-size: 32px;
                letter-spacing: -0.5px;
                color: #000;
                margin-bottom: 120px;
                font-weight: 800; /* 세미볼드 */
                text-align: left;
            }
            
            .marquee {
                display: flex;
                overflow: hidden;
                user-select: none;
                /* 좌우 끝부분 자연스럽게 사라지는 효과 */
                mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
            }
            
            .marquee-content {
                display: flex;
                gap: 80px; /* 아이템 간격 */
                animation: scroll 20s linear infinite; /* 20초 속도 */
                align-items: center;
            }
            
            .partner-item {
                display: flex;
                align-items: center;
                gap: 15px; /* 로고와 이름 사이 간격 */
                flex-shrink: 0;
            }
            
            .partner-item img {
                height: 36px;
                width: auto;
                filter: grayscale(1); /* 흑백 고정 */
            }
            
            .partner-item span {
                font-size: 28px;
                font-weight: 700;
                color: #333;
                letter-spacing: -0.5px;
            }

            @keyframes scroll {
                from { transform: translateX(0); }
                to { transform: translateX(calc(-50% - 50px)); }
            }
            
            /* Section 1: Metrics (한 줄 가로 배치) */
            .metrics-section {
                background-color: #fff;
                padding: 40px 0;
                border-top: 1px solid #f0f0f0;
                overflow-x: auto; /* 모바일에서 넘칠 경우 스크롤 허용 */
                -webkit-overflow-scrolling: touch;
            }
            
            .metrics-container {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 40px;
                min-width: max-content; /* 아이템들이 줄어들지 않게 */
                padding: 0 25px;
            }
            
            .metric-item {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            
            .metric-item svg {
                width: 20px;
                height: 20px;
                color: #000;
            }
            
            .metric-item span {
                font-size: 13px;
                font-weight: 600;
                color: #000;
                white-space: nowrap;
                letter-spacing: -0.3px;
            }
            
            /* Section 2: Philosophy (기존 애니메이션 코드 유지) */
            .identity-section {
                background-color: #fcfcfc;
                padding: 140px 25px;
                overflow: hidden;
            }
            
            .identity-text {
                font-size: 38px;
                line-height: 1.1;
                letter-spacing: -1.8px;
                color: #ddd;
            }
            
            .reveal-line {
                display: block;
                opacity: 0;
                transform: translateY(30px);
                transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1);
            }
            
            .identity-section.active .reveal-line {
                opacity: 1;
                transform: translateY(0);
            }
            
            .identity-section.active .d-1 { transition-delay: 0.1s; }
            .identity-section.active .d-2 { transition-delay: 0.2s; }
            .identity-section.active .d-3-bold { transition-delay: 0.3s; color: #111; font-weight: 800; }
            .identity-section.active .d-4-bold { transition-delay: 0.4s; color: #111; font-weight: 800; }
            

        
    </style>
</head>
<body>

    <nav class="gnb">
        <div class="logo">CMC<span class="reg-mark">®</span></div>
        <div class="nav-right">
            <a href="mailto:contact@chatman.co" class="contact-btn">CONTACT</a>
            <button class="menu-toggle" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <section class="hero">
        <video autoplay muted loop playsinline class="bg-video">
            <source src="bg-video.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <h1>CHATMAN<br>CO.</h1>
            <p>We Create New Worlds.</p>
        </div>
    </section>

    <section class="partners-section">
        <div class="partners-container">
            <p class="partners-title">TRUSTED BY<br>GLOBAL PARTNERS.</p>
            <div class="marquee">
                <div class="marquee-content">
                    <div class="partner-item"><img src="https://www.vectorlogo.zone/logos/microsoft/microsoft-icon.svg"><span>Microsoft</span></div>
                    <div class="partner-item"><img src="https://www.vectorlogo.zone/logos/google/google-icon.svg"><span>Google</span></div>
                    <div class="partner-item"><img src="https://www.vectorlogo.zone/logos/nvidia/nvidia-icon.svg"><span>NVIDIA</span></div>
                    <div class="partner-item"><img src="https://www.vectorlogo.zone/logos/facebook/facebook-official.svg"><span>Meta AI</span></div>
                    <div class="partner-item"><img src="https://upload.wikimedia.org/wikipedia/commons/4/4d/OpenAI_Logo.svg"><span></span></div>
                    <div class="partner-item"><img src="https://www.vectorlogo.zone/logos/apple/apple-icon.svg"><span>Apple</span></div>
                    <div class="partner-item"><img src="https://upload.wikimedia.org/wikipedia/commons/f/f4/BMW_logo_%28gray%29.svg"><span>BMW Group</span></div>
                    <div class="partner-item"><img src="https://www.vectorlogo.zone/logos/microsoft/microsoft-icon.svg"><span>Microsoft</span></div>
                    <div class="partner-item"><img src="https://www.vectorlogo.zone/logos/google/google-icon.svg"><span>Google</span></div>
                    <div class="partner-item"><img src="https://www.vectorlogo.zone/logos/nvidia/nvidia-icon.svg"><span>Nvidia</span></div>
                    <div class="partner-item"><img src="https://www.vectorlogo.zone/logos/facebook/facebook-official.svg"><span>Meta AI</span></div>
                    <div class="partner-item"><img src="https://upload.wikimedia.org/wikipedia/commons/4/4d/OpenAI_Logo.svg"><span></span></div>
                    <div class="partner-item"><img src="https://www.vectorlogo.zone/logos/apple/apple-icon.svg"><span>Apple</span></div>
                    <div class="partner-item"><img src="https://upload.wikimedia.org/wikipedia/commons/f/f4/BMW_logo_%28gray%29.svg"><span>BMW Group</span></div>
                </div>
            </div>
        </div>
    </section>


    <section class="metrics-section">
        <div class="metrics-container">
            <div class="metric-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1v12zM4 22v-7"/></svg>
                <span>Est. 2026</span>
            </div>
            <div class="metric-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span>2,500+ Experts</span>
            </div>
            <div class="metric-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-5c1.62-2.2 5-3 5-3"/><path d="M12 15v5s3.03-.55 5-2c2.2-1.62 3-5 3-5"/></svg>
                <span>$10B+ Revenue</span>
            </div>
        </div>
    </section>
    
    <section class="identity-section">
        <div class="identity-content">
            <p class="identity-text">
                <span class="reveal-line d-1">Architecting</span>
                <span class="reveal-line d-2">the future of</span>
                <span class="reveal-line d-3-bold">Autonomous</span>
                <span class="reveal-line d-4-bold">Intelligence.</span>
            </p>
        </div>
    </section>


    
    <script>
        // 스크롤 감지: 상단 바 색상 변경
        window.addEventListener('scroll', function() {
            const nav = document.querySelector('.gnb');
            if (window.scrollY > 80) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });

        // 메뉴 열기 (나중에 구현)
        function toggleMenu() {
            alert('CMC® 사내 메뉴는 현재 업데이트 중입니다.');
        }


    </script>
</body>
</html>
