<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHATMAN | Mobile HQ</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --accent: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, sans-serif;
            overflow-x: hidden;
        }

        /* 메인 비디오 배너 섹션 */
        .hero {
            position: relative;
            height: 100vh; /* 모바일 꽉 차게 */
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        video {
            position: absolute;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.4); /* 텍스트 잘 보이게 어둡게 조절 */
        }

        .hero-content {
            z-index: 1;
            padding: 20px;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.1rem;
            opacity: 0.8;
            font-weight: 300;
        }

        /* 하단 스크롤 유도 화살표 */
        .scroll-down {
            position: absolute;
            bottom: 30px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* 모바일용 심플 메뉴 */
        .menu-section {
            padding: 50px 25px;
            background: #000;
        }

        .card {
            background: #111;
            border: 1px solid #222;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        h2 { font-size: 1.5rem; margin-bottom: 15px; color: var(--accent); }
    </style>
</head>
<body>

<section class="hero">
    <video autoplay muted loop playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-server-room-4340-large.mp4" type="video/mp4">
    </video>
    
    <div class="hero-content">
        <h1>CHATMAN</h1>
        <p>Connect Anything. Beyond SillyTavern.</p>
    </div>

    <div class="scroll-down">▼</div>
</section>
