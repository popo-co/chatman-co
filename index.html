<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMC® | CHATMAN CO.</title>
    <style>
        :root {
            --white: #ffffff;
            --black: #000000;
            --accent: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* 1. GNB 스타일 (상단 바) */
        .gnb {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            background: transparent;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        /* 스크롤 시 변할 스타일 */
        .gnb.scrolled {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-bottom: 0.5px solid #ddd;
        }

        .logo {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.8px;
            color: var(--white);
            transition: color 0.3s;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .gnb.scrolled .logo { color: var(--black); }

        .reg-mark {
            font-size: 12px;
            vertical-align: super;
            margin-left: 1px;
            font-weight: 400;
            letter-spacing: normal;
        }

        .nav-right { display: flex; align-items: center; gap: 20px; }

        .contact-btn {
            text-decoration: none;
            color: var(--white);
            font-size: 11px;
            font-weight: 600;
            border: 1px solid var(--white);
            padding: 6px 12px;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .gnb.scrolled .contact-btn {
            color: var(--black);
            border-color: var(--black);
        }

        /* 햄버거 메뉴 아이콘 */
        .menu-toggle {
            background: none; border: none; cursor: pointer;
            display: flex; flex-direction: column; gap: 6px;
        }

        .menu-toggle span {
            display: block; width: 24px; height: 1.5px;
            background-color: var(--white); transition: 0.3s;
        }

        .gnb.scrolled .menu-toggle span { background-color: var(--black); }

        /* 2. 히어로 섹션 (비디오 배경) */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            background-color: var(--black);
        }

        .bg-video {
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            object-fit: cover;
            transform: translate(-50%, -50%);
            z-index: 1;
            filter: brightness(0.7);
        }

        .hero-content { position: relative; z-index: 2; padding: 20px; }

        .hero-content h1 {
            font-size: 18vw;
            line-height: 0.85;
            letter-spacing: -0.05em;
            font-weight: 900;
            text-transform: uppercase;
        }

        .hero-content p {
            margin-top: 25px;
            font-size: 13px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0.8;
        }

        /* 3. 컨텐츠 섹션 (스크롤 테스트용) */
            .partners-section {
                background-color: #fff;
                padding: 60px 0 80px 0;
                overflow: hidden;
            }
            
            .partners-container {
                max-width: 100%;
                margin: 0 auto;
            }
            
            .partners-title {
                padding-left: 20px; /* 왼쪽 정렬 및 여백 */
                font-size: 32px;
                letter-spacing: -0.5px;
                color: #000;
                margin-bottom: 120px;
                font-weight: 800; /* 세미볼드 */
                text-align: left;
            }
            
            .marquee {
                display: flex;
                overflow: hidden;
                user-select: none;
                /* 좌우 끝부분 자연스럽게 사라지는 효과 */
                mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
            }
            
            .marquee-content {
                display: flex;
                gap: 80px; /* 아이템 간격 */
                animation: scroll 20s linear infinite; /* 20초 속도 */
                align-items: center;
            }
            
            .partner-item {
                display: flex;
                align-items: center;
                gap: 15px; /* 로고와 이름 사이 간격 */
                flex-shrink: 0;
            }
            
            .partner-item img {
                height: 36px;
                width: auto;
                filter: grayscale(1); /* 흑백 고정 */
            }
            
            .partner-item span {
                font-size: 28px;
                font-weight: 700;
                color: #333;
                letter-spacing: -0.5px;
            }

            @keyframes scroll {
                from { transform: translateX(0); }
                to { transform: translateX(calc(-50% - 50px)); }
            }
            /* Section 1: Metrics Grid (상하 배치) */
            .metrics-grid {
                background-color: #fff;
                padding: 60px 20px;
                display: grid;
                grid-template-columns: repeat(3, 1fr); /* 정확히 3등분 */
                gap: 10px;
                text-align: center;
            }
            
            .metric-block {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }
            
            .icon-wrapper {
                width: 88px;
                height: 88px;
                background-color: #f5f5f5; /* 이미지처럼 아주 연한 회색 박스 */
                border-radius: 20px;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            
            .metric-block svg {
                width: 36px;
                height: 36px;
                color: #333;
            }
            
            .metric-block span {
                font-size: 18px;
                font-weight: 700;
                color: #000;
                letter-spacing: -0.3px;
                line-height: 1.2;
            }
            
            /* 무조건 가로로 양쪽 끝에 붙여버리는 치트키 */
            .contact-header {
                display: flex;
                flex-direction: row !important; /* 무조건 가로 배치 */
                justify-content: space-between; /* 양쪽 끝으로 쫙 찢기 */
                align-items: center;
                margin-bottom: 30px;
                width: 100%;
                flex-wrap: nowrap; /* 절대 밑으로 떨어지지 않게 방어 */
            }
            
            .contact-title {
                font-size: 26px; /* 360px 폰에서 양옆에 들어가게 폰트 살짝 축소 */
                letter-spacing: -1px;
                font-weight: 800;
                color: #000;
                margin: 0;
                white-space: nowrap; /* 좁아도 줄바꿈 방지 */
            }
            
            .apply-link {
                display: flex;
                align-items: center;
                gap: 4px; /* 화살표랑 간격 살짝 좁힘 */
                text-decoration: none;
                white-space: nowrap; /* 링크 줄바꿈 방지 */
                flex-shrink: 0; /* 화면 좁아져도 안 찌그러지게 영역 고정 */
            }
            
            .apply-link span {
                font-size: 13px;
                font-weight: 600;
                color: #666;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
            
            .apply-link svg {
                transition: transform 0.2s ease;
            }
            
            .apply-link:active svg {
                transform: translateX(4px);
            }           
            .contact-form {
                display: flex;
                flex-direction: column;
                gap: 24px;
            }
            
            .form-row {
                display: flex;
                gap: 15px;
            }
            
            /* 360px 모바일 화면에서는 이름/이메일 칸을 위아래로 배치 */
            @media (max-width: 480px) {
                .form-row {
                    flex-direction: column;
                    gap: 24px;
                }
            }
            
            .input-group {
                display: flex;
                flex-direction: column;
                flex: 1;
            }
            
            .input-group label {
                font-size: 13px;
                color: #888;
                margin-bottom: 8px;
                font-weight: 500;
                padding-left: 4px; /* 라벨 살짝 들여쓰기 */
            }
            
            /* 입력창 스타일 (이미지 완벽 재현) */
            .input-group input,
            .input-group textarea {
                background-color: #f2f2f2; /* 연한 회색 배경 */
                border: none;
                border-radius: 12px;
                padding: 16px;
                font-size: 15px;
                color: #111;
                font-family: inherit;
                outline: none;
                transition: background-color 0.2s;
            }
            
            .input-group input::placeholder,
            .input-group textarea::placeholder {
                color: #aaa;
            }
            
            .input-group input:focus,
            .input-group textarea:focus {
                background-color: #e8e8e8; /* 터치 시 살짝 진해짐 */
            }
            
            .input-group textarea {
                height: 140px;
                resize: none; /* 크기 조절 막기 */
            }
            
            /* 하단 블랙 버튼 */
            .submit-btn {
                background-color: #000;
                color: #fff;
                border: none;
                border-radius: 12px;
                padding: 18px;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                margin-top: 10px;
                transition: transform 0.2s, background-color 0.2s;
            }
            
            .submit-btn:active {
                transform: scale(0.97); /* 터치하면 살짝 눌리는 애니메이션 */
                background-color: #222;
            }

        
    </style>
</head>
<body>

    <nav class="gnb">
        <div class="logo">CMC<span class="reg-mark">®</span></div>
        <div class="nav-right">
            <a href="mailto:contact@chatman.co" class="contact-btn">CONTACT</a>
            <button class="menu-toggle" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <section class="hero">
        <video autoplay muted loop playsinline class="bg-video">
            <source src="bg-video.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <h1>CHATMAN<br>CO.</h1>
            <p>We Create New Worlds.</p>
        </div>
    </section>

    <section class="partners-section">
        <div class="partners-container">
            <p class="partners-title">TRUSTED BY<br>GLOBAL PARTNERS.</p>
            <div class="marquee">
                <div class="marquee-content">
                    <div class="partner-item"><img src="https://www.vectorlogo.zone/logos/microsoft/microsoft-icon.svg"><span>Microsoft</span></div>
                    <div class="partner-item"><img src="https://www.vectorlogo.zone/logos/google/google-icon.svg"><span>Google</span></div>
                    <div class="partner-item"><img src="https://www.vectorlogo.zone/logos/nvidia/nvidia-icon.svg"><span>NVIDIA</span></div>
                    <div class="partner-item"><img src="https://www.vectorlogo.zone/logos/facebook/facebook-official.svg"><span>Meta AI</span></div>
                    <div class="partner-item"><img src="https://upload.wikimedia.org/wikipedia/commons/4/4d/OpenAI_Logo.svg"><span></span></div>
                    <div class="partner-item"><img src="https://www.vectorlogo.zone/logos/apple/apple-icon.svg"><span>Apple</span></div>
                    <div class="partner-item"><img src="https://upload.wikimedia.org/wikipedia/commons/f/f4/BMW_logo_%28gray%29.svg"><span>BMW Group</span></div>
                    <div class="partner-item"><img src="https://www.vectorlogo.zone/logos/microsoft/microsoft-icon.svg"><span>Microsoft</span></div>
                    <div class="partner-item"><img src="https://www.vectorlogo.zone/logos/google/google-icon.svg"><span>Google</span></div>
                    <div class="partner-item"><img src="https://www.vectorlogo.zone/logos/nvidia/nvidia-icon.svg"><span>Nvidia</span></div>
                    <div class="partner-item"><img src="https://www.vectorlogo.zone/logos/facebook/facebook-official.svg"><span>Meta AI</span></div>
                    <div class="partner-item"><img src="https://upload.wikimedia.org/wikipedia/commons/4/4d/OpenAI_Logo.svg"><span></span></div>
                    <div class="partner-item"><img src="https://www.vectorlogo.zone/logos/apple/apple-icon.svg"><span>Apple</span></div>
                    <div class="partner-item"><img src="https://upload.wikimedia.org/wikipedia/commons/f/f4/BMW_logo_%28gray%29.svg"><span>BMW Group</span></div>
                </div>
            </div>
        </div>
    </section>


    <section class="metrics-grid">
        <div class="metric-block">
            <div class="icon-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1v12zM4 22v-7"/></svg>
            </div>
            <span>Est.<br>2026</span>
        </div>
        <div class="metric-block">
            <div class="icon-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <span>2,500+<br>Experts</span>
        </div>
        <div class="metric-block">
            <div class="icon-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <span>$10B+<br>Revenue</span>
        </div>
    </section>

    <section class="contact-section">
        <div class="contact-container">
            <h2 class="contact-title">Get in touch.</h2>
            <a href="#" class="apply-link">
                <span>Or Apply</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </a>
            <form class="contact-form">
                <div class="form-row">
                    <div class="input-group">
                        <label>Name</label>
                        <input type="text" placeholder="Jane Smith">
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" placeholder="jane@framer.com">
                    </div>
                </div>
                
                <div class="input-group">
                    <label>Message</label>
                    <textarea placeholder="Your message..."></textarea>
                </div>
                
                <button type="button" class="submit-btn">Contact</button>
            </form>
        </div>
    </section>

    
    <script>
        // 스크롤 감지: 상단 바 색상 변경
        window.addEventListener('scroll', function() {
            const nav = document.querySelector('.gnb');
            if (window.scrollY > 80) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });

        // 메뉴 열기 (나중에 구현)
        function toggleMenu() {
            alert('CMC® 사내 메뉴는 현재 업데이트 중입니다.');
        }


    </script>
</body>
</html>
