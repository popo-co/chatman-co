        CMC<span class="reg-mark">®</span>
    </div>
    <div class="nav-right">
        <a href="#contact" class="contact-btn">CONTACT</a>
        <button class="menu-toggle" onclick="toggleMenu()">
            <span></span>

            <span></span>
        </button>
    </div>
</nav>

<style>
/* GNB 기본 스타일 (메인 상단: 투명 배경 + 흰색 텍스트) */
    .gnb {
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 25px; /* 패딩 넉넉히 주어 잘림 방지 */
        background: transparent; 
        transition: all 0.4s ease; /* 부드러운 색상 전환 */
        z-index: 1000;
        box-sizing: border-box; /* 패딩 포함 크기 계산 */
    }

    /* 스크롤 시 변할 클래스 (흰 바탕 + 검정 텍스트) */
    .gnb.scrolled {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        padding: 15px 25px; /* 스크롤 시 살짝 얇아지게 */
        border-bottom: 0.5px solid #ddd;
    }

    /* 로고 & 텍스트 컬러 설정 */
    .logo, .nav-right .contact-btn {
        color: #fff; /* 기본 하얀색 */
        transition: color 0.3s;
    }

    .gnb.scrolled .logo, 
    .gnb.scrolled .contact-btn {
        color: #000; /* 스크롤 시 검정색 */
    }

    .gnb.scrolled .contact-btn {
        border-color: #000;
    }

    .reg-mark {
        font-size: 8px;
        vertical-align: super;
        margin-left: 2px;
    }

    /* 쓰리바 아이콘 정렬 수정 */
    .menu-toggle {
        background: none;
        border: none;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 5px; /* 터치 영역 확보 */
        justify-content: center;
    }

    .menu-toggle span {
        display: block;
        width: 24px;
        height: 2px;
        background-color: #fff; /* 기본 하얀색 */
        transition: 0.3s;
    }

    /* 스크롤 시 쓰리바 색상 변경 */
    .gnb.scrolled .menu-toggle span {
        background-color: #000;
    }

    /* 페이지 하단 여백용 (내용물이 보일 수 있게) */
    .content-dummy {
        height: 200vh; /* 스크롤 테스트용 */
        background: #fff;
        color: #000;
        padding: 100px 25px;
    }
</style>

<script>
// 스크롤 감지 스크립트
    window.addEventListener('scroll', function() {
        const nav = document.querySelector('.gnb');
        if (window.scrollY > 50) { // 50px 이상 스크롤 되면
            nav.classList.add('scrolled');
        } else {
            nav.classList.remove('scrolled');
        }
    });

    function toggleMenu() {
        // 메뉴 열기 기능은 다음 단계에서!
    }
</script>
