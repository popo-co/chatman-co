<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The CMC® Standard</title>
    <style>
        body { background: #fff; margin: 0; font-family: -apple-system, sans-serif; }
        .container { padding: 100px 20px; text-align: left; }
        h1 { font-size: 32px; font-weight: 800; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 40px; }
        :root {
    --black: #000000;
    --white: #ffffff;
}

    /* --- about.html 전용 GNB 스타일 --- */
        .gnb.about-nav {
            position: fixed;
            top: 0; 
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px; /* 높이 딱 맞춤 */
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 0.5px solid #ddd;
            z-index: 1000;
            box-sizing: border-box; /* 패딩 때문에 삐져나가는 거 방지 */
        }
        
        /* 로고 버튼 스타일 */
        .about-nav .logo { 
            font-size: 22px; 
            font-weight: 900; 
            letter-spacing: -0.8px; 
            color: #000; /* 블랙 고정 */
            display: flex; 
            align-items: center; 
        }
        .about-nav .reg-mark { 
            font-size: 12px; 
            vertical-align: super; 
            margin-left: 1px; 
            font-weight: 400; 
        }
        
        /* 🚨 우측 버튼 컨테이너: 절대 안 내려가게 수직 중앙 정렬 강제 */
        .about-nav .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .about-nav .contact-btn { 
            text-decoration: none; 
            font-size: 11px; 
            font-weight: 600; 
            color: #000; 
            border: 1px solid #000; 
            padding: 6px 12px; 
            border-radius: 20px; 
            display: inline-block;
        }
        
        /* 🚨 햄버거 메뉴: 테두리 짤림/배경 무조건 날려버림 */
        .about-nav .menu-toggle {
            background: transparent !important;
            border: none !important;
            padding: 0;
            margin: 0;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 6px;
            outline: none;
        }
        
        .about-nav .menu-toggle span { 
            display: block; 
            width: 24px; 
            height: 1.5px; 
            background-color: #000; /* 블랙 3줄 고정 */
        }
        /* --- 1. 풀스크린 메뉴 오버레이 --- */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #000;
            z-index: 999; /* 기존 GNB(1000)보다 한 칸 아래 깔림 */
            display: flex;
            flex-direction: column;
            padding: 40px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        
        .menu-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        /* --- 2. 거대한 영문 메뉴 타이포그래피 --- */
        .menu-nav {
            display: flex;
            flex-direction: column;
            gap: 32px;
            margin-top: 80px;
        }
        
        .menu-link {
            font-size: 28px; /* 화면 꽉 차는 사이즈 */
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            transform: translateY(30px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        .menu-overlay.active .menu-link { transform: translateY(0); opacity: 1; }
        .menu-overlay.active .menu-link:nth-child(1) { transition-delay: 0.1s; }
        .menu-overlay.active .menu-link:nth-child(2) { transition-delay: 0.2s; }
        .menu-overlay.active .menu-link:nth-child(3) { transition-delay: 0.3s; }
        
        /* --- 3. 메뉴 열렸을 때 GNB 강제 화이트 & X 변신 --- */
        /* 스크롤 내린 상태에서 메뉴 열어도 뒤에 하얀 배경 날리고 글씨 하얗게 */
        .gnb.menu-open {
            background: transparent !important;
            backdrop-filter: none !important;
            border-bottom: none !important;
        }
        .gnb.menu-open .logo { color: #fff !important; }
        .gnb.menu-open .contact-btn { color: #fff !important; border-color: #fff !important; }
        .gnb.menu-open .menu-toggle span { background-color: #fff !important; }
        
        /* 햄버거 세 줄 -> X로 변신 애니메이션 */
        .gnb.menu-open .menu-toggle span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
        .gnb.menu-open .menu-toggle span:nth-child(2) { opacity: 0; }
        .gnb.menu-open .menu-toggle span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

        /* --- 탭 버튼 영역 (가로 스크롤) --- */
        .tabs-wrapper {
            margin-bottom: 30px;
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch; /* iOS 부드러운 스크롤 */
            scrollbar-width: none; /* 파이어폭스 스크롤바 숨김 */
            /* 왼쪽 끝에 여백을 주기 위해 패딩 대신 마진 조절 */
            margin-left: -20px; 
            padding-left: 20px;
            padding-right: 20px;
        }
        .tabs-wrapper::-webkit-scrollbar {
            display: none; /* 크롬, 사파리 스크롤바 숨김 */
        }

        .category-tabs {
            display: flex;
            gap: 8px; /* 버튼 사이 간격 */
            width: max-content; /* 글자 길이에 맞춰 늘어남 */
        }

        /* 탭 버튼 디자인 */
        .tab-btn {
            padding: 10px 20px;
            border-radius: 30px; /* 완전한 알약 모양 */
            border: 1px solid #ccc;
            background-color: #fff;
            color: #000;
            font-size: 14px; /* 요청하신 14px */
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* 활성화된(선택된) 버튼 디자인 */
        .tab-btn.active {
            background-color: #000;
            color: #fff;
            border-color: #000;
            font-weight: 500;
        }

        /* --- 갤러리 이미지 영역 --- */
        .gallery-content {
            display: none; /* 기본적으로 다 숨김 */
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* active 클래스가 붙은 갤러리만 나타남 */
        .gallery-content.active {
            display: grid;
            animation: fadeIn 0.4s ease; /* 부드럽게 나타나는 효과 */
        }

        .img-box {
            width: 100%;
            aspect-ratio: 4/5; /* 세로로 긴 세련된 비율 */
            background-color: #f5f5f5;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 웰컴 키트 영역 --- */
        .welcome-kit-wrapper {
            display: flex;
            align-items: flex-start; /* 텍스트를 위쪽(상단)으로 정렬 */
            gap: 20px;
            margin-bottom: 40px; /* 아래 탭 버튼들과의 간격 */
        }

        .wk-title {
            font-size: 16px;
            font-weight: 600; /* 세미볼드 */
            line-height: 1.3;
            color: #000;
            flex-shrink: 0; /* 글씨 공간이 찌그러지지 않게 방어 */
            padding-top: 5px; /* 사진과 윗선 밸런스를 살짝 맞춤 */
        }

        .wk-image {
            flex-grow: 1; /* 남은 가로 공간을 사진이 꽉 채움 */
            height: 140px; /* 가로로 긴 형태를 위한 높이 지정 */
            background-color: #eee;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
        }



        
    </style>
</head>
<body>
    <nav class="gnb about-nav">
        <a href="index.html" class="logo" style="text-decoration: none;">
            CMC<span class="reg-mark">®</span>
        </a>
        
        <div class="nav-right">
            <a href="mailto:contact@chatman.co" class="contact-btn">CONTACT</a>
            <button class="menu-toggle" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

<div class="menu-overlay">
    <nav class="menu-nav">
        <a href="#">Corporate Identity</a>
        <a href="divisions.html" class="menu-link">Our Divisions</a>
        <a href="benefitapply.html" class="menu-link">Benefit & Apply</a>
    </nav>
</div>
    
    <div class="container">
        <h1>The CMC® Standard</h1>
        <p>Experience the uncompromising excellence of our global operations.</p>
        <div class="welcome-kit-wrapper">
            <div class="wk-title">👏 Welcome<br>Kit</div>
            <div class="wk-image" style="background-image: url('https://github.com/user-attachments/assets/942b4485-e267-4710-8437-be9cb85f71af');"></div>
        </div>
        <div class="tabs-wrapper">
            <div class="category-tabs">
                <button class="tab-btn active" onclick="showGallery('overview', this)">Overview</button>
                <button class="tab-btn" onclick="showGallery('workspace', this)">Workspace</button>
                <button class="tab-btn" onclick="showGallery('dining', this)">Dining & Lounge</button>
                <button class="tab-btn" onclick="showGallery('wellness', this)">Wellness & Play</button>
            </div>
        </div>

        <div class="gallery-wrapper">
            
            <div id="overview" class="gallery-content active">
                <div class="img-box" style="background-image: url('https://github.com/user-attachments/assets/a14bdeaa-eaab-4865-8427-7237b7a65d7b');"></div>
                <div class="img-box" style="background-image: url('https://github.com/user-attachments/assets/cc871316-9580-489a-a6de-c51acbe0db2c');"></div>
            </div>

            <div id="workspace" class="gallery-content">
                <div class="img-box" style="background-image: url('https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&q=80&w=600');"></div>
            </div>

            <div id="dining" class="gallery-content">
                <div class="img-box" style="background-image: url('https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&q=80&w=600');"></div>
            </div>

            <div id="wellness" class="gallery-content">
                <div class="img-box" style="background-image: url('https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&q=80&w=600');"></div>
            </div>

        </div>
    </div>
    <script>
        function toggleMenu() {
            const nav = document.querySelector('.gnb');
            const overlay = document.querySelector('.menu-overlay');
            nav.classList.toggle('menu-open'); // X자 변신용 클래스 (필요시)
            overlay.classList.toggle('active');
            
            if (overlay.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = '';
            }
        }
    
                // 메뉴 열기/닫기 로직 교체
            function toggleMenu() {
                const nav = document.querySelector('.gnb');
                const overlay = document.querySelector('.menu-overlay');
            
                // 토글: 클래스가 없으면 넣고, 있으면 빼기
                nav.classList.toggle('menu-open');
                overlay.classList.toggle('active');
            
                // 메뉴 열렸을 때 뒤에 원래 페이지 스크롤되는 거 꽉 막기
                if (overlay.classList.contains('active')) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = '';
                }
            }
    // 갤러리 탭 전환 기능
        function showGallery(categoryId, btnElement) {
            // 1. 모든 버튼에서 'active' 클래스 제거 (검은색 끄기)
            const allBtns = document.querySelectorAll('.tab-btn');
            allBtns.forEach(btn => btn.classList.remove('active'));
    
            // 2. 방금 클릭한 버튼에만 'active' 클래스 추가 (검은색 켜기)
            btnElement.classList.add('active');
    
            // 3. 모든 갤러리 내용을 숨기기
            const allGalleries = document.querySelectorAll('.gallery-content');
            allGalleries.forEach(gallery => gallery.classList.remove('active'));
    
            // 4. 클릭한 카테고리의 갤러리만 보이기
            document.getElementById(categoryId).classList.add('active');
            }
    </script>
</body>
</html>
