<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The CMC® Standard</title>
    <style>
        body { background: #fff; margin: 0; font-family: -apple-system, sans-serif; }
        .container { padding: 100px 20px; text-align: left; }
        h1 { font-size: 32px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 40px; }
        :root {
    --black: #000000;
    --white: #ffffff;
}

    /* GNB 기본 스타일 (메인과 동일) */
    .gnb {
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 25px;
        z-index: 1000;
        transition: all 0.3s;
    }
    
    /* 🚨 서브페이지 전용: 처음부터 화이트 배경 + 블랙 텍스트 */
    .about-nav {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-bottom: 0.5px solid #eee;
    }
    
    .about-nav .logo { color: var(--black); font-size: 22px; font-weight: 900; letter-spacing: -0.8px; display: flex; align-items: center; }
    .about-nav .reg-mark { font-size: 12px; vertical-align: super; margin-left: 1px; font-weight: 400; }
    .about-nav .contact-btn { 
        text-decoration: none; font-size: 11px; font-weight: 600; 
        color: var(--black); border: 1px solid var(--black); 
        padding: 6px 12px; border-radius: 20px; 
    }
    .about-nav .menu-toggle span { display: block; width: 24px; height: 1.5px; background-color: var(--black); margin-bottom: 6px; }
    
    /* 풀스크린 메뉴 스타일 (메인과 동일하게 복사) */
    .menu-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
        background-color: #000; z-index: 999; display: flex;
        flex-direction: column; justify-content: center; padding: 40px;
        opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
    }
    .menu-overlay.active { opacity: 1; pointer-events: auto; }
    .menu-link { font-size: 42px; font-weight: 800; color: #fff; text-decoration: none; margin-bottom: 30px; display: block; }
    
    /* 메뉴 열렸을 때 X자 변신 등급 스타일은 메인과 동일하게 추가 가능 */
        /* 이미지 갤러리 레이아웃 (나중에 채울 곳) */
        .gallery { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .img-box { width: 100%; aspect-ratio: 4/5; background: #eee; border-radius: 12px; }
    </style>
</head>
<body>
    <nav class="gnb about-nav">
        <div class="logo">CMC<span class="reg-mark">®</span></div>
        <div class="nav-right">
            <a href="mailto:contact@chatman.co" class="contact-btn">CONTACT</a>
            <button class="menu-toggle" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>
    
    <div class="menu-overlay">
        <nav class="menu-nav">
            <a href="index.html" class="menu-link">Home</a>
            <a href="about.html" class="menu-link">Corporate Identity</a>
            <a href="#" class="menu-link">Our Divisions</a>
            <a href="#" class="menu-link">Careers</a>
        </nav>
    </div>
    
    <div class="container">
        <h1>The CMC® Standard</h1>
        <p>Experience the uncompromising excellence of our global operations.</p>
        
        <div class="gallery">
            <div class="img-box"></div>
            <div class="img-box"></div>
        </div>
    </div>
    <script>
    function toggleMenu() {
        const nav = document.querySelector('.gnb');
        const overlay = document.querySelector('.menu-overlay');
        nav.classList.toggle('menu-open'); // X자 변신용 클래스 (필요시)
        overlay.classList.toggle('active');
        
        if (overlay.classList.contains('active')) {
            document.body.style.overflow = 'hidden';
        } else {
            document.body.style.overflow = '';
        }
    }
    </script>
</body>
</html>
